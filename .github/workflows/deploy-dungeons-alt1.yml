name: Deploy Dungeons Alt1 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "DungeonsAlt1/**"
      - ".github/workflows/deploy-dungeons-alt1.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Dungeons Alt1
        uses: actions/upload-pages-artifact@v4
        with:
          path: DungeonsAlt1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

